<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To'lov | Avto yuvish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f0f4f2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 24px; width: 100%; max-width: 400px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .header { background: #1a8c5a; padding: 1.75rem 1.5rem 1.25rem; text-align: center; }
  .header h1 { color: #fff; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .header p { color: rgba(255,255,255,0.8); font-size: 14px; }
  .body { padding: 1.5rem; }
  .main-btn { display: block; background: #1a8c5a; color: #fff; text-align: center; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 700; text-decoration: none; margin-bottom: 1.25rem; font-family: 'Nunito', sans-serif; border: none; width: 100%; cursor: pointer; }
  .main-btn:active { opacity: 0.85; }
  .section-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
  .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .app-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; border: 1px solid #e8e8e8; border-radius: 12px; background: #f8f8f8; cursor: pointer; text-decoration: none; }
  .app-btn:active { background: #efefef; }
  .app-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff; }
  .app-name { font-size: 11px; font-weight: 600; color: #555; }
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .divider-line { flex: 1; height: 1px; background: #eee; }
  .divider-text { font-size: 12px; color: #aaa; white-space: nowrap; }
  .qr-section { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; border: 1px solid #eee; border-radius: 14px; background: #fafafa; }
  .qr-section p { font-size: 12px; color: #888; text-align: center; }
  .footer { padding: 0.75rem 1.5rem 1.25rem; text-align: center; }
  .footer p { font-size: 12px; color: #aaa; }
  .footer a { color: #1a8c5a; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <!-- Biznes nomini o'zgartiring -->
    <h1>Avto yuvish xizmati</h1>
    <p>Qulay to'lov usulini tanlang</p>
  </div>
  <div class="body">
    <button class="main-btn" onclick="tolov()">To'lash</button>
    <p class="section-label">Ilovangizni tanlang</p>
    <div class="apps-grid">
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#1EADF1">P</div>
        <span class="app-name">Payme</span>
      </a>
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#FF6B35">C</div>
        <span class="app-name">Click</span>
      </a>
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#7C3AED">U</div>
        <span class="app-name">Uzum</span>
      </a>
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#E8333A">A</div>
        <span class="app-name">Anorbank</span>
      </a>
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#0066CC">UC</div>
        <span class="app-name">Uzcard</span>
      </a>
      <a class="app-btn" onclick="tolov()">
        <div class="app-icon" style="background:#F59E0B">H</div>
        <span class="app-name">Humo</span>
      </a>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">yoki QR kod bilan</span>
      <div class="divider-line"></div>
    </div>
    <div class="qr-section">
      <div id="qrcode"></div>
      <p>Ikkinchi qurilmada skanerlang</p>
    </div>
  </div>
  <div class="footer">
    <p>Barcha to'lovlar <a href="https://paynet.uz" target="_blank">Paynet</a> orqali himoyalangan</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // ===== BU YERNI O'ZGARTIRING =====
  var PAYNET_URL = "https://app.paynet.uz/?m=49156&i=de4036f5-f9e8-465a-91be-9e13ef4243ed&branchId=&actTypeId=121";
  // =================================

  function tolov() {
    window.location.href = PAYNET_URL;
  }

  new QRCode(document.getElementById("qrcode"), {
    text: PAYNET_URL,
    width: 180,
    height: 180,
    colorDark: "#000000",
    colorLight: "#fafafa",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
